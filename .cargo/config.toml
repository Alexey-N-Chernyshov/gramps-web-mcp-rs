[env]
# Limit parallel integration tests to avoid Docker resource exhaustion
# (each test spins up its own container)
RUST_TEST_THREADS = "4"

[target.x86_64-unknown-linux-musl]
rustflags = ["-C", "target-feature=+crt-static"]

[target.aarch64-unknown-linux-musl]
rustflags = ["-C", "target-feature=+crt-static"]
